{% extends "base.html" %}

{% block title %}Order History - Pink Scoops{% endblock %}

{% block extra_css %}
<style>
    .history-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
    }
    
    .history-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .history-header h1 {
        font-size: 2.5rem;
        color: #ff4d6d;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }
    
    .empty-orders {
        text-align: center;
        padding: 4rem;
        background: white;
        border-radius: 30px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    
    .empty-orders h3 {
        color: #ff4d6d;
        margin-bottom: 1rem;
    }
    
    .order-card {
        background: white;
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        transition: all 0.3s;
    }
    
    .order-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255,77,109,0.1);
    }
    
    .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        padding-bottom: 1rem;
        border-bottom: 1px solid #eee;
        margin-bottom: 1rem;
    }
    
    .order-id {
        font-weight: bold;
        color: #ff4d6d;
    }
    
    .order-date {
        color: #888;
    }
    
    .order-status {
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
    }
    
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #cce5ff; color: #004085; }
    .status-preparing { background: #d4edda; color: #155724; }
    .status-out_for_delivery { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    
    .order-items {
        margin-bottom: 1rem;
    }
    
    .order-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
        border-bottom: 1px dashed #eee;
    }
    
    .order-total {
        text-align: right;
        font-size: 1.2rem;
        font-weight: bold;
        color: #ff4d6d;
        margin-top: 1rem;
    }
    
    .reorder-btn {
        background: #ff4d6d;
        color: white;
        border: none;
        padding: 0.5rem 1.5rem;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 1rem;
        transition: all 0.3s;
    }
    
    .reorder-btn:hover {
        background: #e63e5e;
        transform: translateY(-2px);
    }
    
    .loading {
        text-align: center;
        padding: 3rem;
    }
    
    .loading i {
        font-size: 3rem;
        color: #ff4d6d;
        margin-bottom: 1rem;
    }
    
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 1rem;
        border-radius: 10px;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="history-container">
    <div class="history-header">
        <h1>
            <i class="fas fa-history"></i>
            Order History
        </h1>
        <p>View and reorder your past orders</p>
    </div>
    
    <div id="ordersList" class="orders-list">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading your orders...</p>
        </div>
    </div>
</div>

<script>
    async function loadOrders() {
        const container = document.getElementById('ordersList');
        
        try {
            const response = await fetch('/api/orders/user');
            
            if (!response.ok) {
                throw new Error('Failed to fetch orders');
            }
            
            const orders = await response.json();
            console.log('Orders loaded:', orders);
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <div class="empty-icon">📦</div>
                        <h3>No orders yet</h3>
                        <p>Looks like you haven't placed any orders yet.</p>
                        <a href="{{ url_for('menu') }}" class="btn-primary" style="display: inline-block; margin-top: 1rem; background: #ff4d6d; color: white; padding: 0.8rem 2rem; border-radius: 50px; text-decoration: none;">Browse Menu</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id">Order #${order.orderId}</span>
                        <span class="order-date">${new Date(order.orderDate).toLocaleDateString()}</span>
                        <span class="order-status status-${order.status}">${order.status.replace('_', ' ').toUpperCase()}</span>
                    </div>
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <span>${item.flavor} x ${item.qty}</span>
                                <span>₹${item.price * item.qty}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="order-total">
                        Total: ₹${order.pricing.total}
                    </div>
                    ${order.status !== 'cancelled' ? `
                        <button class="reorder-btn" onclick="reorder('${order.orderId}')">
                            <i class="fas fa-redo-alt"></i> Reorder
                        </button>
                    ` : ''}
                </div>
            `).join('');
            
        } catch(e) {
            console.error('Error loading orders:', e);
            container.innerHTML = `
                <div class="empty-orders">
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error loading orders. Please try again.</p>
                    </div>
                    <button onclick="loadOrders()" class="reorder-btn" style="margin-top: 1rem;">Retry</button>
                </div>
            `;
        }
    }
    
    async function reorder(orderId) {
        try {
            const response = await fetch('/api/orders/user');
            const orders = await response.json();
            const order = orders.find(o => o.orderId === orderId);
            
            if (order && order.items && order.items.length > 0) {
                let cart = JSON.parse(localStorage.getItem('pinkCart') || '[]');
                
                order.items.forEach(item => {
                    // Create cart item
                    const cartItem = {
                        id: Date.now() + Math.random(),
                        flavor: item.flavor,
                        price: item.price,
                        qty: item.qty,
                        topping: item.topping || 'No topping',
                        cone: item.cone || 'Waffle Cone',
                        image: item.image || 'https://via.placeholder.com/80?text=🍦'
                    };
                    
                    // Check if already in cart
                    const existingIndex = cart.findIndex(cartItem => cartItem.flavor === item.flavor);
                    if (existingIndex >= 0) {
                        cart[existingIndex].qty += item.qty;
                    } else {
                        cart.push(cartItem);
                    }
                });
                
                localStorage.setItem('pinkCart', JSON.stringify(cart));
                
                showNotification('Items added to cart! 🛒', 'success');
                
                setTimeout(() => {
                    window.location.href = "{{ url_for('order') }}";
                }, 1500);
            }
        } catch(e) {
            console.error('Error reordering:', e);
            showNotification('Error reordering. Please try again.', 'error');
        }
    }
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.style.cssText = `
            position: fixed;
            top: 100px;
            right: 20px;
            background: ${type === 'success' ? '#ff4d6d' : '#d63031'};
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        `;
        notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }
    
    document.addEventListener('DOMContentLoaded', loadOrders);
</script>

<style>
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .btn-primary {
        background: #ff4d6d;
        color: white;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
    }
    
    .btn-primary:hover {
        background: #e63e5e;
        transform: translateY(-2px);
    }
    
    .empty-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}
